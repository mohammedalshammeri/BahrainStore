# ─── api.bazar.bh ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.bazar.bh;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name api.bazar.bh;

    ssl_certificate     /etc/nginx/certs/api.bazar.bh.crt;
    ssl_certificate_key /etc/nginx/certs/api.bazar.bh.key;

    client_max_body_size 20M;

    # Uploaded files served directly by nginx (faster than Node)
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ─── dashboard.bazar.bh ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name dashboard.bazar.bh;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name dashboard.bazar.bh;

    ssl_certificate     /etc/nginx/certs/dashboard.bazar.bh.crt;
    ssl_certificate_key /etc/nginx/certs/dashboard.bazar.bh.key;

    location / {
        proxy_pass         http://dashboard:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── *.bazar.bh (storefront — wildcard subdomain) ────────────────────────────
server {
    listen 80;
    server_name *.bazar.bh;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name *.bazar.bh;

    # Wildcard cert issued by Certbot / Let's Encrypt
    ssl_certificate     /etc/nginx/certs/wildcard.bazar.bh.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard.bazar.bh.key;

    location / {
        proxy_pass         http://storefront:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
